projects:
  - name: Kakodemon
    description:
      - Utvikler et GPU-akselerert grafisk grensesnitt for Kakoune, en terminalbasert kodeeditor.
      - Utviklet med C++ og OpenGL, strukturert etter heksagonal arkitektur med MVC i applikasjonskjernen.
      - Kommuniserer med Kakoune-backenden via JSON-RPC, med parallell håndtering av forespørsler gjennom multithreading.
      - "Bygget for Linux desktop med tett integrasjon: FontConfig og FreeType for håndtering av fonter, og POSIX-konsepter som named pipes for kommunikasjon mellom prosesser."
    github_url: github.com/falbru/kakodemon
    start_date: Juli 2025
    end_date: d.d.

